background-color=#141917
text-color=#EAE6E1
border-color=#2B3935
progress-color=over #2F4741
width=420
height=110
padding=12
border-size=2
border-radius=12
font=Liberation Sans 11
anchor=top-right
outer-margin=20
default-timeout=5000
max-icon-size=32
icons=1
markup=1
format=<b>%s</b>\n%b

[urgency=low]
background-color=#141917
text-color=#7A8F6D
border-color=#262A2D
default-timeout=3000

[urgency=normal]
background-color=#141917
text-color=#EAE6E1
border-color=#2B3935
default-timeout=5000

[urgency=high]
background-color=#141917
text-color=#F1F5EF
border-color=#7C4D57
default-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=true

[mode=do-not-disturb app-name=notify-send]
invisible=false
